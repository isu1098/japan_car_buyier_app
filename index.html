<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Index</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <h2>Savings Goal Calculator</h2>

        <div class="input-group">
            <label for="car-budget">Target Car Budget (¥):</label>
            <input type="number" id="car-budget" name="budget">
        </div>

        <div class="input-group">
            <label for="savings">Current Savings (¥):</label>
            <input type="number" id="savings" name="savings">
        </div>

        <div class="input-group">
            <label for="month">Months until purchase:</label>
            <input type="number" id="month" name="month">
        </div>

        <button>Calculate</button>
    </form>

    <div id="result-display"></div>
    
</body>
</html>
